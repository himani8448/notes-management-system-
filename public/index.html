<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes Management System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Notes Management System</h1>

<div class="form">

<input type="text" id="name" placeholder="Enter Name">

<input type="text" id="course" placeholder="Enter Course">

<input type="date" id="date">

<textarea id="note" placeholder="Write Notes"></textarea>

<button onclick="saveNote()">Save Note</button>

</div>

<div class="search">

<h2>Search By Date</h2>

<input type="date" id="searchDate" onkeyup="filterNotes()" onchange="filterNotes()">

</div>

<div id="notesContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
